services:
  postgres:
    image: postgres:18
    container_name: postgre_estudos
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 250107gks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_estudos
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: gabrielkochsilva@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 250107gks
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: